name: Deploy TradeVision to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "next.config.mjs"
      - "open-next.config.ts"
      - "wrangler-tradevision.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npx @opennextjs/cloudflare build

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler-tradevision.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_TRADEVISION_V1 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_TRADEVISION_V1 }}
