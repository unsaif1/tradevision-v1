name: Deploy TradeVision to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "src/app/stitch/**"
      - "src/app/(dashboard)/**"
      - "src/components/**"
      - "src/lib/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "next.config.mjs"
      - "open-next.config.ts"
      - "wrangler.toml"
      - ".github/workflows/deploy-tradevision.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npx @opennextjs/cloudflare build

      - name: Apply D1 schema
        run: npm run cf:typegen
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_TRADEVISION_V1 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_TRADEVISION_V1 }}

      - name: Apply database migrations
        run: npx wrangler d1 migrations apply trade-vision --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_TRADEVISION_V1 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_TRADEVISION_V1 }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_TRADEVISION_V1 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_TRADEVISION_V1 }}
