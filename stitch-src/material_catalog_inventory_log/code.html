<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Core Vend Terminal - Catalog</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500;700&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#00f0ff",
                        "on-tertiary": "#303031",
                        "background": "#111317",
                        "on-primary-fixed": "#002022",
                        "surface-container-lowest": "#0c0e12",
                        "primary-fixed-dim": "#00dbe9",
                        "on-secondary-fixed": "#271900",
                        "error-container": "#93000a",
                        "on-tertiary-fixed": "#1b1c1c",
                        "error": "#ffb4ab",
                        "surface-variant": "#333539",
                        "outline": "#849495",
                        "on-background": "#e2e2e8",
                        "surface-container-high": "#282a2e",
                        "primary": "#dbfcff",
                        "surface": "#111317",
                        "on-primary-container": "#006970",
                        "tertiary": "#f7f5f5",
                        "surface-tint": "#00dbe9",
                        "surface-container-highest": "#333539",
                        "secondary-container": "#feb700",
                        "on-surface-variant": "#b9cacb",
                        "on-secondary-container": "#6b4b00",
                        "tertiary-fixed": "#e4e2e2",
                        "surface-dim": "#111317",
                        "on-tertiary-container": "#5e5f5f",
                        "inverse-primary": "#006970",
                        "outline-variant": "#3b494b",
                        "on-primary-fixed-variant": "#004f54",
                        "inverse-surface": "#e2e2e8",
                        "secondary-fixed-dim": "#ffba20",
                        "on-surface": "#e2e2e8",
                        "on-secondary": "#412d00",
                        "surface-bright": "#37393e",
                        "primary-fixed": "#7df4ff",
                        "on-primary": "#00363a",
                        "on-tertiary-fixed-variant": "#464747",
                        "surface-container-low": "#1a1c20",
                        "secondary": "#ffdb9d",
                        "inverse-on-surface": "#2f3035",
                        "on-error": "#690005",
                        "surface-container": "#1e2024",
                        "tertiary-fixed-dim": "#c7c6c6",
                        "tertiary-container": "#dad9d9",
                        "on-secondary-fixed-variant": "#5e4200",
                        "secondary-fixed": "#ffdea8",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "margin-desktop": "32px",
                        "density-comfortable": "24px",
                        "unit": "4px",
                        "margin-mobile": "16px",
                        "density-compact": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Space Grotesk"],
                        "display-lg-mobile": ["Space Grotesk"],
                        "display-lg": ["Space Grotesk"],
                        "label-caps": ["JetBrains Mono"],
                        "data-point": ["JetBrains Mono"],
                        "body-fixed": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-lg-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-caps": ["12px", { "lineHeight": "1.0", "fontWeight": "500" }],
                        "data-point": ["20px", { "lineHeight": "1.0", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-fixed": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: theme('colors.background'); color: theme('colors.on-background'); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Cyber Industrial Specifics */
        .cyber-border { border: 1px solid #2D2D2D; } /* 'Zinc' border */
        .cyber-panel { background-color: theme('colors.surface-container-low'); border: 1px solid #2D2D2D; }
        .cyber-chip { background-color: theme('colors.surface-container-high'); border: 1px solid theme('colors.outline-variant'); }
        .cyber-active-border { border: 1px solid theme('colors.primary-container'); box-shadow: inset 0 0 8px rgba(0, 240, 255, 0.1); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen pb-[80px]">
<!-- TopAppBar Shared Component -->
<header class="bg-background dark:bg-background border-b border-outline-variant bg-surface-container-lowest w-full top-0 sticky z-50 flex justify-between items-center px-margin-mobile h-16 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary-container dark:text-primary-container" data-icon="terminal">terminal</span>
<h1 class="font-headline-md text-headline-md font-bold uppercase tracking-tighter text-primary-container dark:text-primary-container">CORE_VEND_TERMINAL</h1>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden border border-outline-variant">
<span class="material-symbols-outlined text-on-surface-variant text-sm" data-icon="person">person</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="p-margin-mobile flex flex-col gap-density-comfortable">
<!-- Search & Filter Bar -->
<section class="cyber-panel p-density-compact flex flex-col gap-density-compact rounded">
<div class="flex items-center gap-2 bg-surface-container-lowest border border-outline-variant px-3 py-2 rounded focus-within:border-primary-container transition-colors">
<span class="material-symbols-outlined text-outline" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 text-on-background font-body-fixed text-body-fixed w-full outline-none placeholder:text-on-surface-variant" placeholder="Search [ CORE_INVENTORY ]..." type="text"/>
<span class="material-symbols-outlined text-primary-container cursor-pointer" data-icon="qr_code_scanner">qr_code_scanner</span>
</div>
<div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
<button class="cyber-chip font-label-caps text-label-caps px-3 py-1.5 rounded whitespace-nowrap text-on-background cyber-active-border text-primary-container">ALL_CLASSES</button>
<button class="cyber-chip font-label-caps text-label-caps px-3 py-1.5 rounded whitespace-nowrap text-on-background hover:bg-surface-variant transition-colors">TPO</button>
<button class="cyber-chip font-label-caps text-label-caps px-3 py-1.5 rounded whitespace-nowrap text-on-background hover:bg-surface-variant transition-colors">ISO</button>
<button class="cyber-chip font-label-caps text-label-caps px-3 py-1.5 rounded whitespace-nowrap text-on-background hover:bg-surface-variant transition-colors">FASTENERS</button>
<button class="cyber-chip font-label-caps text-label-caps px-3 py-1.5 rounded whitespace-nowrap text-on-background hover:bg-surface-variant transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="filter_list">filter_list</span> FILTERS
                </button>
</div>
</section>
<!-- Catalog Grid -->
<section class="grid grid-cols-1 gap-4">
<!-- Item Card 1 -->
<article class="cyber-panel flex flex-col rounded relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-primary-container"></div>
<div class="p-3 border-b border-outline-variant flex justify-between items-start bg-surface-container">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="font-label-caps text-label-caps px-1 py-0.5 bg-surface-variant text-on-surface-variant border border-outline rounded-[2px]">TPO</span>
<span class="font-label-caps text-label-caps text-outline">SKU: TPO-060-10X100</span>
</div>
<h2 class="font-body-fixed text-body-fixed font-semibold text-on-background">60-mil TPO Membrane Roll</h2>
</div>
<div class="text-right">
<div class="font-data-point text-data-point text-primary-container">$345.00</div>
<div class="font-label-caps text-label-caps text-outline mt-1">[ PRICE_PER_UNIT ]</div>
</div>
</div>
<div class="p-3 grid grid-cols-3 gap-2 bg-surface-container-lowest">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-outline mb-1">STOCK</span>
<span class="font-data-point text-data-point text-on-background">24<span class="text-[12px] text-outline ml-1">rls</span></span>
</div>
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-outline mb-1">LOC</span>
<span class="font-data-point text-[16px] text-on-background mt-1">A-12-B</span>
</div>
<div class="flex items-end justify-end">
<button class="bg-primary-container text-on-primary-container font-label-caps text-label-caps px-4 py-2 rounded font-bold uppercase active:scale-95 transition-transform flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="add_shopping_cart">add_shopping_cart</span> ADD
                        </button>
</div>
</div>
</article>
<!-- Item Card 2 -->
<article class="cyber-panel flex flex-col rounded relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-secondary-container"></div>
<div class="p-3 border-b border-outline-variant flex justify-between items-start bg-surface-container">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="font-label-caps text-label-caps px-1 py-0.5 bg-surface-variant text-on-surface-variant border border-outline rounded-[2px]">ISO</span>
<span class="font-label-caps text-label-caps text-outline">SKU: ISO-20-4X8</span>
</div>
<h2 class="font-body-fixed text-body-fixed font-semibold text-on-background">2.0" Polyiso Insulation Board</h2>
</div>
<div class="text-right">
<div class="font-data-point text-data-point text-on-background">$42.50</div>
<div class="font-label-caps text-label-caps text-outline mt-1">[ PRICE_PER_UNIT ]</div>
</div>
</div>
<div class="p-3 grid grid-cols-3 gap-2 bg-surface-container-lowest">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-outline mb-1">STOCK</span>
<span class="font-data-point text-data-point text-secondary-container">08<span class="text-[12px] text-outline ml-1">pcs</span></span>
</div>
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-outline mb-1">LOC</span>
<span class="font-data-point text-[16px] text-on-background mt-1">Y-04-A</span>
</div>
<div class="flex items-end justify-end">
<button class="bg-surface-variant text-on-background font-label-caps text-label-caps px-4 py-2 rounded border border-outline-variant active:scale-95 transition-transform flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="add_shopping_cart">add_shopping_cart</span> ADD
                        </button>
</div>
</div>
</article>
</section>
</main>
<!-- BottomNavBar Shared Component -->
<nav class="bg-surface-container-lowest dark:bg-surface-container-lowest border-t border-outline-variant fixed bottom-0 left-0 w-full flex justify-around items-center px-unit pb-safe z-50 md:hidden">
<button class="flex flex-col items-center justify-center text-outline p-2 hover:text-primary-fixed-dim active:bg-surface-variant transition-all flex-1">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-caps text-label-caps mt-1">DASHBOARD</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-none border-t-2 border-primary-container p-2 hover:text-primary-fixed-dim active:bg-surface-variant transition-all flex-1">
<span class="material-symbols-outlined" data-icon="inventory_2" data-weight="fill">inventory_2</span>
<span class="font-label-caps text-label-caps mt-1">CATALOG</span>
</button>
<button class="flex flex-col items-center justify-center text-outline p-2 hover:text-primary-fixed-dim active:bg-surface-variant transition-all flex-1">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-label-caps text-label-caps mt-1">ORDERS</span>
</button>
<button class="flex flex-col items-center justify-center text-outline p-2 hover:text-primary-fixed-dim active:bg-surface-variant transition-all flex-1">
<span class="material-symbols-outlined" data-icon="local_shipping">local_shipping</span>
<span class="font-label-caps text-label-caps mt-1">LOGISTICS</span>
</button>
</nav>
</body></html>
