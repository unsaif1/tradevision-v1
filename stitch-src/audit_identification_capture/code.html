<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Custom HUD elements */
        .hud-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: theme('colors.neon-pink');
        }
        .hud-tl { top: 8px; left: 8px; border-top-width: 2px; border-left-width: 2px; }
        .hud-tr { top: 8px; right: 8px; border-top-width: 2px; border-right-width: 2px; }
        .hud-bl { bottom: 8px; left: 8px; border-bottom-width: 2px; border-left-width: 2px; }
        .hud-br { bottom: 8px; right: 8px; border-bottom-width: 2px; border-right-width: 2px; }

        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(226, 30, 81, 0.5);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>

<body class="bg-surface-base text-on-surface font-body-md text-body-md flex flex-col h-screen overflow-hidden antialiased">
<header class="bg-surface border-b border-surface-stroke fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 w-full">
<div class="flex items-center gap-2 text-neon-pink">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-neon-pink font-label-caps tracking-widest uppercase">FIELD AUDIT TERMINAL</h1>
<div class="flex items-center gap-2 text-neon-pink hover:bg-surface-bright transition-colors active:scale-95 duration-100 rounded p-1 cursor-pointer">
<span class="material-symbols-outlined">settings_input_component</span>
</div>
</header>
<main class="flex-1 mt-16 mb-20 overflow-y-auto px-margin-mobile py-stack-gap flex flex-col gap-stack-gap">
<div class="flex justify-between items-center bg-surface-container-low px-3 py-2 rounded border border-surface-stroke">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-neon-green animate-pulse"></div>
<span class="font-label-caps text-label-caps text-neon-green tracking-wider">LiDAR SENSOR: ACTIVE</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-text-muted">my_location</span>
<span class="font-label-caps text-label-caps text-text-muted tracking-wider">GPS PRECISION: ±0.02m</span>
</div>
</div>
<div class="relative w-full aspect-square md:aspect-video bg-surface-container-lowest border border-surface-stroke rounded overflow-hidden">

<div class="absolute inset-0 bg-neon-blue/5 mix-blend-overlay"></div>
<div class="hud-corner hud-tl"></div>
<div class="hud-corner hud-tr"></div>
<div class="hud-corner hud-bl"></div>
<div class="hud-corner hud-br"></div>
<div class="scan-line"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center pointer-events-none">
<div class="w-px h-full bg-neon-pink/50"></div>
<div class="h-px w-full bg-neon-pink/50 absolute"></div>
<div class="w-2 h-2 border border-neon-pink rounded-full absolute"></div>
</div>
<div class="absolute top-[30%] left-[20%] w-[60%] h-[40%] border-2 border-neon-orange bg-error-container/20 flex flex-col justify-end p-1">
<span class="font-label-caps text-label-caps text-neon-orange bg-surface-base/80 px-1 w-max">DETECTED FLAW</span>
</div>
<div class="absolute bottom-2 right-2 flex items-center gap-1 bg-surface-base/80 px-2 py-1 rounded border border-surface-stroke">
<span class="material-symbols-outlined text-[14px] text-neon-blue">zoom_in</span>
<span class="font-label-caps text-label-caps text-neon-blue">1.4x OPTICAL</span>
</div>
</div>
<div class="grid grid-cols-2 gap-stack-gap">

<span class="font-label-caps text-label-caps text-text-muted mb-1">STRESS COEFF</span>
<span class="font-stat-display text-stat-display text-neon-pink">0.88<span class="text-headline-lg-mobile text-text-muted ml-1">μ</span></span>
</div>
<div class="bg-surface-elevated border border-neon-orange rounded p-stack-gap flex flex-col">
<span class="font-label-caps text-label-caps text-text-muted mb-1">DEVIATION</span>

</div>
</div>

<option>Surface Spalling</option>
<option>Rebar Corrosion</option>
<option>Thermal Cracking</option>
</select>

<button class="flex-1 border border-surface-stroke bg-surface-container text-text-muted font-label-caps text-label-caps py-2 rounded hover:bg-surface-bright transition-colors">MOD</button>
<button class="flex-1 border border-neon-pink bg-primary-container/10 text-neon-pink font-label-caps text-label-caps py-2 rounded">CRITICAL</button>
</div>
</div>
</div>
<div class="flex flex-col gap-stack-gap mt-4">
<button class="w-full bg-neon-pink text-white font-label-caps text-label-caps py-4 rounded tracking-widest active:scale-95 duration-100 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">cloud_sync</span>
                CAPTURE &amp; SYNC
            </button>
<button class="w-full border border-surface-stroke text-text-muted font-label-caps text-label-caps py-3 rounded tracking-widest hover:bg-surface-bright active:scale-95 duration-100">
                CANCEL AUDIT
            </button>
</div>
</main>

<span class="font-label-caps text-label-caps">IDENTIFY</span>
</div>

<span class="font-label-caps text-label-caps">EVIDENCE</span>
</div>
<div class="flex flex-col items-center justify-center text-text-muted cursor-pointer hover:text-secondary active:opacity-80 transition-opacity">
<span class="material-symbols-outlined mb-1">assignment_turned_in</span>
<span class="font-label-caps text-label-caps">VERIFY</span>
</div>
<div class="flex flex-col items-center justify-center text-text-muted cursor-pointer hover:text-secondary active:opacity-80 transition-opacity">

</div>
