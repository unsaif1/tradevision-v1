        .industrial-glow { box-shadow: inset 0 0 10px rgba(0, 219, 233, 0.1); }

    </style>

    body {

<body class="bg-surface text-on-surface font-body-fixed antialiased pb-20">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 bg-surface dark:bg-surface border-b border-outline-variant flex justify-between items-center px-margin-mobile py-density-compact">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">precision_manufacturing</span>
<h1 class="font-headline-md text-headline-md-mobile text-primary-container uppercase tracking-tighter">TradeVision C.A.R.E.</h1>
</div>
<button class="hover:bg-surface-variant transition-colors active:scale-95 duration-100 p-2 rounded text-on-surface-variant">
<span class="material-symbols-outlined">settings_input_component</span>
</button>
</header>
<main class="p-margin-mobile space-y-margin-mobile">
<!-- Portfolio Quality Index Gauge -->
<section class="industrial-border bg-surface-container rounded-lg p-density-comfortable relative overflow-hidden">
<div class="absolute top-0 right-0 bg-primary-fixed-dim text-on-primary px-3 py-1 font-data-point text-sm rounded-bl-lg">SYS_OK</div>
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-4 tracking-widest">Portfolio Quality Index</h2>
<div class="flex justify-center items-center py-6">
<div class="relative w-48 h-48">
<!-- Placeholder for dynamic gauge -->
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="45" stroke="#2D2D2D" stroke-width="10"></circle>
<circle class="transition-all duration-1000 ease-out" cx="50" cy="50" fill="none" r="45" stroke="#00dbe9" stroke-dasharray="283" stroke-dashoffset="60" stroke-width="10"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-display-lg-mobile text-display-lg-mobile text-primary-fixed-dim">78</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">/ 100</span>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-unit text-center border-t border-outline-variant pt-4">
<div>
<div class="font-data-point text-data-point text-on-surface">142</div>
<div class="font-label-caps text-label-caps text-on-surface-variant mt-1">Total Claims</div>
</div>
<div>
<div class="font-data-point text-data-point text-secondary-container">12</div>
<div class="font-label-caps text-label-caps text-on-surface-variant mt-1">Pending Review</div>
</div>
</div>
</section>
<!-- Grade A Section -->
<section class="industrial-border bg-surface-container rounded-lg overflow-hidden border-l-4 border-l-primary-fixed-dim">
<button class="w-full flex justify-between items-center p-density-compact bg-surface-container-high hover:bg-surface-variant transition-colors group">
<div class="flex items-center gap-3">
<div class="bg-primary-container text-on-primary-container font-data-point w-8 h-8 flex items-center justify-center rounded">A</div>
<div class="text-left">
<h3 class="font-headline-md text-sm font-bold text-on-surface">Verified Claims</h3>
<p class="font-label-caps text-[10px] text-on-surface-variant">High documentation score</p>
</div>
</div>
<div class="flex items-center gap-4">
<span class="font-data-point text-lg text-primary-fixed-dim">45</span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary-fixed-dim transition-colors">expand_more</span>
</div>
</button>
<div class="p-density-compact space-y-unit hidden">
<!-- List items would go here -->
</div>
</section>
<!-- Grade B Section -->
<section class="industrial-border bg-surface-container rounded-lg overflow-hidden border-l-4 border-l-secondary-fixed-dim">
<button class="w-full flex justify-between items-center p-density-compact bg-surface-container-high hover:bg-surface-variant transition-colors group">
<div class="flex items-center gap-3">
<div class="bg-secondary-fixed-dim text-on-secondary font-data-point w-8 h-8 flex items-center justify-center rounded">B</div>
<div class="text-left">
<h3 class="font-headline-md text-sm font-bold text-on-surface">Standard Processing</h3>
<p class="font-label-caps text-[10px] text-on-surface-variant">Minor missing data</p>
</div>
</div>
<div class="flex items-center gap-4">
<span class="font-data-point text-lg text-secondary-fixed-dim">68</span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-secondary-fixed-dim transition-colors">expand_more</span>
</div>
</button>
</section>
<!-- Grade C Section (Expanded) -->

<div class="flex items-center gap-3">
<div class="bg-secondary-container text-on-secondary-container font-data-point w-8 h-8 flex items-center justify-center rounded">C</div>
<div class="text-left">
<h3 class="font-headline-md text-sm font-bold text-on-surface">Inconsistent/Flagged</h3>
<p class="font-label-caps text-[10px] text-on-surface-variant">Significant anomalies detected</p>
</div>
</div>
<div class="flex items-center gap-4">
<span class="font-data-point text-lg text-secondary-container">21</span>
<span class="material-symbols-outlined text-secondary-container transition-transform rotate-180">expand_more</span>
</div>
</button>
<div class="p-unit space-y-unit bg-surface-dim">
<!-- Claim Item 1 -->
<div class="industrial-border bg-surface-container rounded p-3 flex justify-between items-center">
<div>
<div class="font-data-point text-sm text-on-surface mb-1">CLM-2023-8901</div>

<span class="material-symbols-outlined text-[12px]">schedule</span> 14 Days Stale
                            </span>
</div>
</div>
<div class="w-16 h-8 opacity-70">

<svg class="w-full h-full" viewbox="0 0 100 30">
<polyline fill="none" points="0,15 20,25 40,10 60,20 80,5 100,28" stroke="#feb700" stroke-width="2"></polyline>
</svg>
</div>
</div>
<!-- Claim Item 2 -->
<div class="industrial-border bg-surface-container rounded p-3 flex justify-between items-center">
<div>
<div class="font-data-point text-sm text-on-surface mb-1">CLM-2023-9022</div>
<div class="flex items-center gap-2">
<span class="font-label-caps text-[10px] bg-surface-variant px-1.5 py-0.5 rounded text-on-surface-variant">METAL</span>
<span class="font-label-caps text-[10px] text-secondary-container flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]">schedule</span> 11 Days Stale
                            </span>
</div>
</div>
<div class="w-16 h-8 opacity-70">
<svg class="w-full h-full" viewbox="0 0 100 30">
<polyline fill="none" points="0,5 20,15 40,8 60,25 80,18 100,22" stroke="#feb700" stroke-width="2"></polyline>
</svg>
</div>
</div>
</div>

<div class="text-left">
<h3 class="font-headline-md text-sm font-bold text-error">Suspicious/Critical</h3>
<p class="font-label-caps text-[10px] text-on-surface-variant">Integrity failure</p>
</div>
</div>
<div class="flex items-center gap-4">
<span class="font-data-point text-lg text-error">8</span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-error transition-colors">expand_more</span>
</div>
</button>
</section>

<nav class="fixed bottom-0 w-full z-50 bg-surface-container-highest dark:bg-surface-container-highest border-t border-outline-variant flex justify-around items-center h-16 md:hidden">

<span class="font-label-caps text-label-caps">Safety</span>
