<script>
        // Simple JS for radio button visual state sync (though CSS handles most of it)
        const priorities = document.querySelectorAll('input[name="priority"]');
        priorities.forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Reset all indicators
                document.querySelectorAll('.radio-indicator').forEach(ind => {
                    ind.style.backgroundColor = 'transparent';
                });
                // Set active indicator
                if(e.target.checked) {
                    const indicator = e.target.nextElementSibling.querySelector('.radio-indicator');
                    if(e.target.nextElementSibling.classList.contains('border-error')) {
                        indicator.style.backgroundColor = 'theme("colors.error")'; // fallback logic
                    } else if (e.target.nextElementSibling.classList.contains('border-secondary')) {
                        indicator.style.backgroundColor = 'theme("colors.secondary")';
                    } else {
                        indicator.style.backgroundColor = 'theme("colors.outline")';
                    }
                }
            });
        });
        
        // Trigger initial state visually
        document.querySelector('input[name="priority"]:checked').dispatchEvent(new Event('change'));
    </script>
