<style>
        .ar-grid {
            background-image: 
                linear-gradient(to right, rgba(45, 55, 72, 0.2) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(45, 55, 72, 0.2) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(226, 30, 81, 0.5);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .reticle-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: #E21E51;
            border-style: solid;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-base text-on-surface font-body-md antialiased min-h-screen flex flex-col pt-16 pb-24">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface border-b border-surface-stroke dark:border-surface-stroke fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 shadow-none">
<button aria-label="Menu" class="text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-highest transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</button>
<div class="font-label-caps text-label-caps tracking-widest text-neon-pink dark:text-neon-pink text-center flex-1 font-bold">

        </div>

<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</header>

<!-- Task Header -->
<div class="flex items-center justify-between mb-2">
<div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Active Repair Interface</h1>
<p class="font-caption text-caption text-text-muted mt-1">Task ID: RPR-8924-X</p>
</div>
<div class="bg-surface-container-highest px-3 py-1 rounded border border-surface-stroke flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-neon-green animate-pulse"></div>
<span class="font-label-caps text-label-caps text-neon-green">LIVE</span>
</div>
</div>
<!-- AR Viewfinder -->

<div class="absolute inset-0 bg-cover bg-center opacity-40 mix-blend-luminosity" data-alt="A gritty, industrial maintenance area viewed through a high-contrast digital camera feed. The scene features complex metallic pipework and heavy machinery in a dimly lit environment, with harsh shadows emphasizing the rugged textures. The overall aesthetic is dark and technical, fitting a sci-fi command center visual style." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBL_BIrP0NAQjIy5olZCO1a7QlDkd9x6B8npjyNlEmWlQKg_rc3gEqCm9wnorusjulcXhrhDhtRSrBQ99x84Qeb_Za4O87Yj97OsNttu4Zny8yWXN4noiy8tD_bsKKL2EWNmoeOgJpZT3xo6rraK73bmaei3VIFbuTw_jhrbCxImysNw95usn6w4Dwb3ksg5iHnuYVPVTr-fgmf1lGANRbysTj76L9XGTtQJ8dbIk2fdmFyq8pHr6xQy9QmBjpm87jEgMVgqopMDYF6');">

</div>

</label>

<label class="flex items-start gap-4 p-4 hover:bg-surface-container-highest transition-colors cursor-pointer group">
