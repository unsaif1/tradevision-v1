<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-industrial {
            background-color: transparent;
            border: none;
            border-bottom: 1px solid #30353c; /* surface-variant */
            color: #dee3eb; /* on-surface */
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            line-height: 18px;
            border-radius: 0;
            padding-left: 0;
            padding-right: 0;
            transition: border-color 0.2s ease-in-out;
        }
        .input-industrial:focus {
            outline: none;
            box-shadow: none;
            border-bottom: 1px solid #e21e51; /* primary-container */
        }
        .input-industrial::placeholder {
            color: #aeb6c3; /* on-secondary-container */
        }
        .btn-primary {
            background-color: #e21e51; /* primary-container */
            color: #fffcff; /* on-primary-container */
            border-radius: 0;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            line-height: 16px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 12px 24px;
            transition: background-color 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #be003e; /* inverse-primary used as hover */
        }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center p-gutter">
<!-- Suppressed TopAppBar & BottomNavBar as per Semantic Shell Mandate for Transactional/Onboarding flows -->
<main class="w-full max-w-2xl">
<!-- Progress Indicator -->
<div class="mb-margin">
<div class="flex justify-between items-center mb-2">
<span class="font-label-caps text-label-caps text-secondary uppercase">Step 1 of 2</span>
<span class="font-label-caps text-label-caps text-secondary uppercase">Profile Configuration</span>
</div>
<div class="h-1 w-full bg-surface-container-highest rounded-none flex overflow-hidden">
<div class="h-full bg-primary-container w-1/2"></div>
</div>
</div>
<!-- Form Card -->
<div class="bg-[#1a1f26] border border-[#2a323d] p-[32px]">
<header class="mb-margin">
<h1 class="font-display-md text-display-md text-on-surface mb-2">Complete Profile</h1>
<p class="font-body-md text-body-md text-secondary">Establish your operational identity within the TradeVision C.A.R.E. network.</p>
</header>
<form class="space-y-[32px]">
<!-- Photo Upload Placeholder -->
<div class="flex items-center gap-[24px]">
<div class="w-[80px] h-[80px] bg-surface-container border border-surface-variant flex items-center justify-center rounded-none group cursor-pointer hover:border-primary-container transition-colors">
<span class="material-symbols-outlined text-secondary group-hover:text-primary-container transition-colors" style="font-size: 32px;">add_a_photo</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface uppercase mb-1">Identity Visual</p>
<p class="font-body-md text-body-md text-secondary text-sm">Upload a high-resolution portrait. Format: JPG, PNG. Max size: 5MB.</p>
</div>
</div>
<!-- Input Group: Full Name -->
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface uppercase mb-2 flex items-center gap-2" for="fullName">
<span class="material-symbols-outlined" style="font-size: 16px;">person</span>
                        Full Legal Name
                    </label>
<input class="input-industrial w-full py-2" id="fullName" placeholder="e.g. Jane Doe" type="text"/>
</div>
<!-- Input Group: Professional Title -->
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface uppercase mb-2 flex items-center gap-2" for="title">
<span class="material-symbols-outlined" style="font-size: 16px;">badge</span>
                        Professional Title
                    </label>
<input class="input-industrial w-full py-2" id="title" placeholder="e.g. Senior Operations Analyst" type="text"/>
</div>
<!-- Input Group: Contact Number -->
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-on-surface uppercase mb-2 flex items-center gap-2" for="contact">
<span class="material-symbols-outlined" style="font-size: 16px;">call</span>
                        Primary Contact Number
                    </label>
<input class="input-industrial w-full py-2" id="contact" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<!-- Action Button -->
<div class="pt-4 flex justify-end">
<button class="btn-primary flex items-center gap-2" type="button">
                        Proceed to Step 2
                        <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
</body></html>
