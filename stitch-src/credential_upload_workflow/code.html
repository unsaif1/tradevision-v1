<main class="w-full max-w-[800px] bg-surface-container border border-surface-variant rounded-lg shadow-2xl flex flex-col overflow-hidden relative">
<!-- Top Accent Line -->

<!-- Header -->

</div>
<div>
<h1 class="font-headline-sm text-headline-sm text-on-surface uppercase">Submit Credential</h1>
<p class="font-mono-data text-mono-data text-on-surface-variant mt-1">SECURE UPLOAD PORTAL // TX-C-492</p>
</div>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded hover:bg-surface-variant group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform" data-icon="close">close</span>

<!-- Form Content -->
<div class="p-margin flex flex-col gap-margin bg-surface-container">

<!-- Credential Type -->
<div class="flex flex-col gap-2">

</label>
<div class="relative">
<select class="w-full appearance-none bg-surface border border-surface-variant text-on-surface font-body-md px-4 py-3 rounded focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:outline-none transition-colors" id="credential-type">
<option disabled="" selected="" value="">Select classification...</option>
<option value="license">State License (General)</option>

</div>
</div>

<input class="w-full bg-surface border border-surface-variant text-on-surface font-mono-data text-mono-data px-4 py-3 rounded focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:outline-none transition-colors" id="expiration-date" type="date"/>
</div>

<script>
        // Micro-interactions for demonstration
        document.addEventListener('DOMContentLoaded', () => {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-upload');
            const checkbox = document.getElementById('authenticity-check');
            const submitBtn = document.getElementById('submit-btn');
            const typeSelect = document.getElementById('credential-type');
            const dateInput = document.getElementById('expiration-date');

            // Form validation logic
            function checkFormValidity() {
                const isTypeSelected = typeSelect.value !== "";
                const isDateSelected = dateInput.value !== "";
                const isChecked = checkbox.checked;
                // In a real app, also check if file is selected
                
                if (isTypeSelected && isDateSelected && isChecked) {
                    submitBtn.removeAttribute('disabled');
                } else {
                    submitBtn.setAttribute('disabled', 'true');
                }
            }

            checkbox.addEventListener('change', checkFormValidity);
            typeSelect.addEventListener('change', checkFormValidity);
            dateInput.addEventListener('change', checkFormValidity);

            // Drag and Drop visual feedback
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults (e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, highlight, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, unhighlight, false);
            });

            function highlight(e) {
                dropZone.classList.add('border-primary-container', 'bg-surface-container-high');
                dropZone.classList.remove('border-surface-variant');
            }

            function unhighlight(e) {
                dropZone.classList.remove('border-primary-container', 'bg-surface-container-high');
                dropZone.classList.add('border-surface-variant');
            }

            // Click to upload delegation
            dropZone.addEventListener('click', () => {
                fileInput.click();
            });

            // Handle file selection (visual update only)
            fileInput.addEventListener('change', function(e) {
                if(this.files && this.files[0]) {
                    const fileName = this.files[0].name;
                    const textElement = dropZone.querySelector('.font-headline-sm');
                    textElement.textContent = fileName;
                    textElement.classList.add('text-primary-fixed-dim');
                    dropZone.querySelector('.material-symbols-outlined').textContent = 'task';
                }
            });
        });
    </script>
