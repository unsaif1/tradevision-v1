<style>
        body {
            background-color: #111317; /* surface */
            color: #e2e2e8; /* on-surface */
        }
        
        .gauge-ring {
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 1s ease-out;
        }
        
        /* Custom scrollbar for industrial feel */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1e2024; 
        }
        ::-webkit-scrollbar-thumb {
            background: #3b494b; 
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface font-body-fixed antialiased pb-24 h-screen flex flex-col md:hidden">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface border-b border-outline-variant flex justify-between items-center px-margin-mobile py-density-compact">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container">precision_manufacturing</span>
<h1 class="font-headline-md text-headline-md-mobile text-primary-container uppercase tracking-tighter">TradeVision C.A.R.E.</h1>
</div>
<button class="text-on-surface-variant hover:bg-surface-variant transition-colors active:scale-95 duration-100 p-2 rounded-DEFAULT">
<span class="material-symbols-outlined">settings_input_component</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-density-comfortable space-y-gutter">

<div class="mb-gutter">
<h2 class="font-headline-md text-headline-md text-on-surface">Deal Quality Scoring</h2>
<p class="font-body-fixed text-body-fixed text-on-surface-variant text-sm mt-1">Pipeline Health Telemetry</p>
</div>
<!-- Scorecard / Gauge Section -->
<section class="bg-surface-container border border-outline-variant rounded-DEFAULT p-gutter relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-primary-fixed-dim"></div>
<div class="flex justify-between items-center">
<div>
<div class="font-label-caps text-label-caps text-on-surface-variant mb-2">OVERALL HEALTH</div>
<div class="font-display-lg-mobile text-display-lg-mobile text-primary-fixed-dim">78<span class="text-2xl text-on-surface-variant ml-1">%</span></div>
<div class="mt-4 flex gap-4">
<div>
<div class="font-label-caps text-label-caps text-on-surface-variant">ACTIVE DEALS</div>
<div class="font-data-point text-data-point text-on-surface mt-1">142</div>
</div>
<div>
<div class="font-label-caps text-label-caps text-on-surface-variant">AT RISK</div>
<div class="font-data-point text-data-point text-error mt-1">28</div>
</div>
</div>
</div>
<!-- SVG Gauge -->
<div class="relative w-24 h-24 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 160 160">
<circle cx="80" cy="80" fill="none" r="70" stroke="#333539" stroke-width="12"></circle>
<circle class="gauge-ring" cx="80" cy="80" fill="none" r="70" stroke="#00dbe9" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-fixed-dim text-3xl">trending_up</span>
</div>
</div>
</div>
</section>
<!-- Grading Buckets -->
<div class="space-y-unit">
<!-- Grade A -->
<div class="bg-surface-container border border-outline-variant rounded-DEFAULT overflow-hidden group">
<button class="w-full text-left p-density-compact flex items-center justify-between hover:bg-surface-variant transition-colors">
<div class="flex items-center gap-density-compact">
<div class="w-8 h-8 rounded-DEFAULT bg-[#00f0ff] bg-opacity-20 flex items-center justify-center border border-[#00f0ff]">
<span class="font-data-point text-data-point text-[#00f0ff]">A</span>
</div>

</div>
</div>
<div class="flex items-center gap-2">

<span class="material-symbols-outlined text-on-surface-variant transition-transform group-hover:text-on-surface">expand_more</span>
</div>
</button>

</div>
</button>
</div>
<!-- Grade C (Expanded for demonstration) -->

<button class="w-full text-left p-density-compact flex items-center justify-between bg-surface-variant">

<div class="w-8 h-8 rounded-DEFAULT bg-[#feb700] bg-opacity-20 flex items-center justify-center border border-[#feb700]">

</div>
<div>

<div class="text-xs text-on-surface-variant font-body-fixed mt-0.5">Declining health, moderate staleness</div>
</div>
</div>
<div class="flex items-center gap-2">
<div class="font-data-point text-data-point text-on-surface">22</div>

<div class="p-density-compact flex justify-between items-center hover:bg-surface-variant transition-colors cursor-pointer">

</div>

<span class="material-symbols-outlined text-on-surface-variant transition-transform group-hover:text-on-surface">expand_more</span>

</button>

<nav class="fixed bottom-0 w-full z-50 bg-surface-container-highest flex justify-around items-center h-16 pb-[env(safe-area-inset-bottom)]">

<span class="material-symbols-outlined mb-1">terminal</span>

</button>

</button>

<script>
        // Simple animation for the gauge on load
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const gauge = document.querySelector('.gauge-ring');
                if(gauge) {
                    // 78% of 440 circumference approx 97 offset
                    gauge.style.strokeDashoffset = '96.8'; 
                }
            }, 300);
        });
    </script>
