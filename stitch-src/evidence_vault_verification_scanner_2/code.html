<style>

<script>
        // Simple script to update progress bar randomly to simulate scanning
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.querySelector('.bg-primary-container.w-\\[64\\%\\]');
            const progressText = document.querySelector('.text-primary-container.font-data-point');
            let currentProgress = 64;

            setInterval(() => {
                if(currentProgress < 99) {
                    currentProgress += Math.random() > 0.5 ? 1 : 0;
                    if(progressBar) progressBar.style.width = `${currentProgress}%`;
                    if(progressText) progressText.textContent = `${currentProgress}%`;
                }
            }, 500);
        });
    </script>
