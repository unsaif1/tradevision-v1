<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TRADEVISION C.A.R.E. - Critical Alert</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#171c22",
                        "on-tertiary-fixed-variant": "#005138",
                        "error-container": "#93000a",
                        "secondary-container": "#3f4753",
                        "on-tertiary-fixed": "#002114",
                        "on-secondary-container": "#aeb6c3",
                        "secondary": "#bfc7d5",
                        "on-primary": "#67001e",
                        "on-error": "#690005",
                        "on-background": "#dee3eb",
                        "surface-tint": "#ffb2b9",
                        "surface-container-highest": "#30353c",
                        "inverse-primary": "#be003e",
                        "on-primary-fixed-variant": "#91002e",
                        "on-primary-fixed": "#40000f",
                        "secondary-fixed-dim": "#bfc7d5",
                        "primary": "#ffb2b9",
                        "on-secondary-fixed-variant": "#3f4753",
                        "on-error-container": "#ffdad6",
                        "tertiary": "#72daad",
                        "outline": "#ab888a",
                        "surface-variant": "#30353c",
                        "surface-container-high": "#252a31",
                        "surface": "#0f141a",
                        "tertiary-fixed-dim": "#72daad",
                        "on-tertiary-container": "#f5fff7",
                        "on-primary-container": "#fffcff",
                        "secondary-fixed": "#dbe3f1",
                        "primary-fixed": "#ffdadb",
                        "tertiary-fixed": "#8ff7c7",
                        "on-surface-variant": "#e4bdbf",
                        "inverse-surface": "#dee3eb",
                        "inverse-on-surface": "#2c3137",
                        "primary-fixed-dim": "#ffb2b9",
                        "primary-container": "#e21e51",
                        "tertiary-container": "#00855e",
                        "outline-variant": "#5c3f42",
                        "surface-dim": "#0f141a",
                        "background": "#0f141a",
                        "surface-container-lowest": "#0a0f14",
                        "on-surface": "#dee3eb",
                        "error": "#ffb4ab",
                        "on-tertiary": "#003826",
                        "surface-container": "#1b2026",
                        "on-secondary": "#29313c",
                        "surface-bright": "#353a40",
                        "on-secondary-fixed": "#141c26"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "grid_columns": "12",
                        "unit": "4px",
                        "header_height": "64px",
                        "sidebar_width": "260px",
                        "margin": "32px"
                    },
                    "fontFamily": {
                        "label-caps": ["Barlow Condensed"],
                        "body-lg": ["Inter"],
                        "mono-data": ["JetBrains Mono"],
                        "headline-sm": ["Barlow Condensed"],
                        "display-lg": ["Barlow Condensed"],
                        "display-md": ["Barlow Condensed"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "mono-data": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "headline-sm": ["20px", { "lineHeight": "24px", "letterSpacing": "0.03em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "52px", "letterSpacing": "0.02em", "fontWeight": "700" }],
                        "display-md": ["32px", { "lineHeight": "36px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #0f141a; color: #dee3eb; }
        .glitch-effect { animation: glitch 2s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }
        .pulse-border { animation: pulseBorder 1.5s infinite; }
        @keyframes pulseBorder {
            0% { border-color: rgba(226, 30, 81, 0.4); box-shadow: 0 0 0 0 rgba(226, 30, 81, 0.4); }
            70% { border-color: rgba(226, 30, 81, 1); box-shadow: 0 0 0 10px rgba(226, 30, 81, 0); }
            100% { border-color: rgba(226, 30, 81, 0.4); box-shadow: 0 0 0 0 rgba(226, 30, 81, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased overflow-hidden h-screen w-screen relative font-body-md">
<!-- Synthetic Background View (To simulate being overlaid) -->
<div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 50% 50%, #1a1f26 0%, #0f141a 100%);">
<div class="h-full w-full flex flex-col p-margin gap-gutter blur-sm">
<div class="h-32 w-full bg-surface-container-low border border-surface-variant rounded"></div>
<div class="flex gap-gutter h-64">
<div class="flex-1 bg-surface-container-low border border-surface-variant rounded"></div>
<div class="flex-1 bg-surface-container-low border border-surface-variant rounded"></div>
</div>
</div>
</div>
<!-- The Critical Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center bg-[#0a0f14]/80 backdrop-blur-md transition-opacity duration-300">
<!-- Alert Card -->
<div aria-modal="true" class="bg-[#232931] border-2 border-primary-container pulse-border rounded-lg shadow-2xl w-full max-w-2xl mx-4 overflow-hidden relative flex flex-col" role="alertdialog">
<!-- Warning Tape / Top Banner -->
<div class="bg-primary-container text-on-primary-container h-1.5 w-full"></div>
<div class="p-8 flex flex-col items-center text-center">
<!-- Icon -->
<div class="mb-6 relative">
<div class="absolute inset-0 bg-primary-container rounded-full blur-xl opacity-20 animate-pulse"></div>
<span class="material-symbols-outlined text-[80px] text-primary-container glitch-effect" data-icon="warning" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                        warning
                    </span>
</div>
<!-- Headline -->
<h1 class="font-display-lg text-display-lg text-primary-container uppercase tracking-widest mb-2">
                    Critical Anomaly
                </h1>
<p class="font-headline-sm text-headline-sm text-on-surface-variant mb-8 uppercase">
                    Immediate Action Required
                </p>
<!-- Data Block -->
<div class="w-full bg-surface-container-low border border-outline-variant p-6 rounded text-left mb-8">
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Event ID</span>
<span class="font-mono-data text-mono-data text-on-surface">EVT-994-OMEGA</span>
</div>
<div class="flex flex-col gap-1">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Timestamp</span>
<span class="font-mono-data text-mono-data text-error">2023.10.24 :: 14:02:44 UTC</span>
</div>
<div class="flex flex-col gap-1">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Sector / Node</span>
<span class="font-mono-data text-mono-data text-on-surface">Sector 7 / Core Strut B</span>
</div>
<div class="flex flex-col gap-1">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase">Telemetry Delta</span>
<span class="font-mono-data text-mono-data text-error">+4.2% Shear Stress (Critical)</span>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex gap-4 w-full">
<button class="flex-1 bg-transparent border border-outline-variant text-on-surface font-label-caps text-label-caps py-3 px-6 rounded uppercase hover:bg-surface-variant transition-colors" onclick="console.log('Ack')">
                        Acknowledge
                    </button>
<button class="flex-1 bg-primary-container text-on-primary-container font-label-caps text-label-caps py-3 px-6 rounded uppercase hover:bg-primary-container/90 transition-colors shadow-[0_0_15px_rgba(226,30,81,0.3)]" onclick="console.log('Initiate')">
                        Initiate Protocol
                    </button>
</div>
</div>
<!-- Progress Bar / Timeout indicator -->
<div class="w-full bg-surface-container-highest h-1">
<div class="bg-primary-container h-full w-full origin-left" style="animation: scaleX 10s linear forwards;"></div>
</div>
<style>
                @keyframes scaleX { from { transform: scaleX(1); } to { transform: scaleX(0); } }
            </style>
</div>
</div>
</body></html>
