<h1 class="font-display-lg text-display-lg text-on-surface mb-2 relative z-10 uppercase">Evidence Verified</h1>
<!-- Description -->
<p class="font-body-lg text-body-lg text-on-secondary-container mb-8 max-w-md relative z-10">

        </p>
<!-- Data Card -->
<div class="w-full bg-surface-container-high border border-surface-variant rounded flex flex-col p-6 mb-8 relative z-10">
<div class="flex justify-between items-center border-b border-[#2a323d] pb-4 mb-4">
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">Submission ID</span>

</div>
<div class="flex justify-between items-center border-b border-[#2a323d] pb-4 mb-4">
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">Timestamp (UTC)</span>
<span class="font-mono-data text-mono-data text-on-surface">2023-10-27 14:32:01</span>
</div>
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">Signature Hash</span>
<span class="font-mono-data text-mono-data text-on-surface opacity-75 truncate max-w-[200px]" title="0x8f3a...d9e1">0x8f3a...d9e1</span>
</div>
</div>

<button class="bg-primary-container text-white font-label-caps text-label-caps uppercase px-6 py-3 rounded hover:bg-inverse-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">folder_open</span>
