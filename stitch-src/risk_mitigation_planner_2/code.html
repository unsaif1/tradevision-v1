<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Risk Mitigation Planner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface-variant": "#c3c6d7",
                        "on-tertiary-fixed": "#002113",
                        "tertiary-fixed": "#6ffbbe",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-error-container": "#ffdad6",
                        "primary-container": "#2563eb",
                        "on-secondary-fixed": "#001e2c",
                        "secondary-fixed": "#c4e7ff",
                        "tertiary-fixed-dim": "#4edea3",
                        "on-tertiary-container": "#bdffdb",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-primary-fixed": "#00174b",
                        "surface": "#0b1326",
                        "outline-variant": "#434655",
                        "on-secondary-fixed-variant": "#004c69",
                        "surface-variant": "#2d3449",
                        "primary-fixed": "#dbe1ff",
                        "neon-blue": "#2563EB",
                        "surface-dim": "#0b1326",
                        "secondary-container": "#00a6e0",
                        "primary": "#b4c5ff",
                        "border-muted": "#334155",
                        "surface-container": "#171f33",
                        "surface-container-high": "#222a3d",
                        "surface-input": "#0F172A",
                        "on-tertiary": "#003824",
                        "neon-cyan": "#06B6D4",
                        "outline": "#8d90a0",
                        "on-error": "#690005",
                        "on-primary-container": "#eeefff",
                        "surface-container-highest": "#2d3449",
                        "secondary-fixed-dim": "#7bd0ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary-container": "#007d55",
                        "on-background": "#dae2fd",
                        "inverse-surface": "#dae2fd",
                        "error": "#ffb4ab",
                        "surface-card": "#1E293B",
                        "background": "#0b1326",
                        "inverse-primary": "#0053db",
                        "inverse-on-surface": "#283044",
                        "surface-tint": "#b4c5ff",
                        "surface-container-low": "#131b2e",
                        "on-primary": "#002a78",
                        "secondary": "#7bd0ff",
                        "on-secondary-container": "#00374d",
                        "surface-bright": "#31394d",
                        "surface-container-lowest": "#060e20",
                        "error-container": "#93000a",
                        "on-secondary": "#00354a",
                        "on-surface": "#dae2fd",
                        "tertiary": "#4edea3"
                    },
                    borderRadius: {
                        DEFAULT: "0.125rem",
                        lg: "0.25rem",
                        xl: "0.5rem",
                        full: "0.75rem"
                    },
                    spacing: {
                        gutter: "16px",
                        unit: "4px",
                        "margin-desktop": "32px",
                        "container-max": "1440px",
                        "margin-mobile": "16px"
                    },
                    fontFamily: {
                        "headline-sm": ["JetBrains Mono"],
                        "headline-lg": ["JetBrains Mono"],
                        "body-md": ["Inter"],
                        "label-md": ["JetBrains Mono"],
                        "headline-md": ["JetBrains Mono"],
                        "body-lg": ["Inter"],
                        "label-sm": ["JetBrains Mono"],
                        "headline-lg-mobile": ["JetBrains Mono"]
                    },
                    fontSize: {
                        "headline-sm": ["18px", { lineHeight: "24px", fontWeight: "600" }],
                        "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                        "label-md": ["12px", { lineHeight: "16px", fontWeight: "500" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
                        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "label-sm": ["10px", { lineHeight: "14px", fontWeight: "500" }],
                        "headline-lg-mobile": ["24px", { lineHeight: "30px", fontWeight: "700" }]
                    }
                }
            }
        };
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased md:hidden pb-20">
<!-- TopAppBar (Semantic Intent: MITIGATE active) -->
<header class="bg-surface dark:bg-surface border-b border-outline-variant flex justify-between items-center h-16 px-gutter w-full sticky top-0 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-neon-blue dark:text-primary">terminal</span>
<span class="font-headline-sm text-headline-sm font-bold tracking-tighter text-neon-blue dark:text-primary">RISK_CORE_v1.0</span>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-variant border border-outline-variant flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>
</div>
</div>
</header>
<main class="px-margin-mobile py-6 flex flex-col gap-6">
<!-- Header Section -->
<div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Mitigation Planner</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Select AI-recommended protocols to lower site risk score.</p>
</div>
<!-- Risk Score Overview (Bento Grid Style) -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-card border border-outline-variant rounded-xl p-4 flex flex-col justify-between">
<span class="font-label-md text-label-md text-on-surface-variant mb-1">Current Risk</span>
<div class="flex items-end gap-2">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-error">84</span>
<span class="font-body-md text-body-md text-error-container mb-1">High</span>
</div>
</div>
<div class="bg-surface-card border border-outline-variant rounded-xl p-4 flex flex-col justify-between">
<span class="font-label-md text-label-md text-on-surface-variant mb-1">Projected Risk</span>
<div class="flex items-end gap-2">
<span class="font-headline-lg-mobile text-headline-lg-mobile text-tertiary">42</span>
<span class="font-body-md text-body-md text-tertiary-container mb-1">Low</span>
</div>
</div>
</div>
<!-- Projected Reduction Chart Placeholder -->
<div class="bg-surface-card border border-outline-variant rounded-xl p-4 h-48 flex flex-col relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-surface-card to-surface-variant opacity-50"></div>
<div class="relative z-10 flex justify-between items-center mb-4">
<span class="font-label-md text-label-md text-on-surface">Reduction Forecast</span>
<span class="material-symbols-outlined text-on-surface-variant text-sm">show_chart</span>
</div>
<!-- Mock Chart Area -->
<div class="relative flex-1 flex items-end justify-between gap-2 px-2 mt-auto">
<div class="w-full bg-error rounded-t-sm h-[80%]"></div>
<div class="w-full bg-error rounded-t-sm h-[75%]"></div>
<div class="w-full bg-secondary rounded-t-sm h-[60%]"></div>
<div class="w-full bg-secondary rounded-t-sm h-[50%]"></div>
<div class="w-full bg-tertiary rounded-t-sm h-[40%]"></div>
<div class="w-full bg-tertiary rounded-t-sm h-[35%]"></div>
<!-- Trend line mock -->
<svg class="absolute inset-0 w-full h-full" preserveaspectratio="none" viewbox="0 0 100 100">
<path class="opacity-70" d="M 5 20 Q 30 25, 50 40 T 95 65" fill="none" stroke="#2563EB" stroke-dasharray="4" stroke-width="2"></path>
</svg>
</div>
</div>
<!-- Mitigation Protocols -->
<div class="flex flex-col gap-3">
<h2 class="font-headline-sm text-headline-sm text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-neon-blue text-sm">smart_toy</span> AI Recommendations
            </h2>
<!-- Protocol 1 (Selected) -->
<label class="bg-surface-container-high border border-neon-blue rounded-xl p-4 flex gap-4 items-start cursor-pointer transition-colors relative overflow-hidden">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-neon-blue"></div>
<input checked="" class="mt-1 w-5 h-5 rounded border-outline-variant text-neon-blue focus:ring-neon-blue focus:ring-offset-surface bg-surface-input" type="checkbox"/>
<div class="flex-1">
<div class="flex justify-between items-start mb-1">
<span class="font-headline-sm text-headline-sm text-on-surface">Deploy Moisture Barrier</span>
<span class="font-label-md text-label-md text-tertiary bg-tertiary-container/20 px-2 py-0.5 rounded">-18 pts</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Recommended due to 85% humidity forecast in sector 7G.</p>
</div>
</label>
<!-- Protocol 2 -->
<label class="bg-surface-card border border-outline-variant hover:border-neon-blue/50 rounded-xl p-4 flex gap-4 items-start cursor-pointer transition-colors relative">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-transparent group-hover:bg-neon-blue/30 transition-colors"></div>
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-neon-blue focus:ring-neon-blue focus:ring-offset-surface bg-surface-input" type="checkbox"/>
<div class="flex-1">
<div class="flex justify-between items-start mb-1">
<span class="font-headline-sm text-headline-sm text-on-surface">Seal Structural Joints</span>
<span class="font-label-md text-label-md text-tertiary bg-tertiary-container/20 px-2 py-0.5 rounded">-24 pts</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">Critical vulnerability detected in primary support beams.</p>
</div>
</label>
</div>
<!-- Action Button -->
<button class="w-full bg-neon-blue hover:bg-inverse-primary text-white font-headline-sm text-headline-sm py-4 rounded-xl transition-colors mt-4 flex justify-center items-center gap-2">
<span class="material-symbols-outlined">bolt</span>
            Apply Mitigation Plan
        </button>
</main>
<!-- BottomNavBar (MITIGATE is active) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-surface-container-high border-t border-outline-variant">
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-60 w-full h-full cursor-pointer hover:text-primary transition-colors active:scale-95">
<span class="material-symbols-outlined mb-1 text-lg">grid_view</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">MATRIX</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-60 w-full h-full cursor-pointer hover:text-primary transition-colors active:scale-95">
<span class="material-symbols-outlined mb-1 text-lg">query_stats</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">FORECAST</span>
</div>
<div class="flex flex-col items-center justify-center text-neon-blue dark:text-tertiary border-t-2 border-neon-blue pt-1 mt-[-1px] w-full h-full cursor-pointer active:scale-95">
<span class="material-symbols-outlined fill mb-1 text-lg">security</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">MITIGATE</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-60 w-full h-full cursor-pointer hover:text-primary transition-colors active:scale-95">
<span class="material-symbols-outlined mb-1 text-lg">factory</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">SITES</span>
</div>
</nav>
</body></html>
